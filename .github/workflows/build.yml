name: Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-cpp:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup VS2022 dev env
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Build Release x64
      shell: cmd
      run: cd ab_source && msbuild "新伪心跳.vcxproj" /p:Configuration=Release /p:Platform=x64 /v:minimal

    - name: Upload exe
      uses: actions/upload-artifact@v4
      with:
        name: 夜白AB伪心跳1.0-x64
        path: ab_source/x64/Release/ab.exe
        if-no-files-found: error

    - name: Upload PDB
      uses: actions/upload-artifact@v4
      with:
        name: 夜白AB伪心跳1.0-x64-pdb
        path: ab_source/x64/Release/ab.pdb
        if-no-files-found: warn

  build-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build MRPORT-Agent for Windows
        run: |
          cd mrport-agent
          go mod tidy
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o "MRPORT-Agent.exe" .

      - name: Upload MRPORT-Agent
        uses: actions/upload-artifact@v4
        with:
          name: MRPORT-Agent-v1.0.0
          path: mrport-agent/MRPORT-Agent.exe
