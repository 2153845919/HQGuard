name: Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Publish
        shell: pwsh
        run: |
          dotnet publish -c Release -o _publish -r win-x64 --self-contained true
          # 下载并提取 WinDivert 驱动
          curl -L -o WinDivert.zip "https://github.com/basil00/WinDivert/releases/download/v2.2.2/WinDivert-2.2.2-A.zip"
          Expand-Archive WinDivert.zip -DestinationPath WinDivert -Force
          # 自动查找驱动文件
          $sys = Get-ChildItem -Recurse -Filter WinDivert64.sys | Select-Object -First 1
          $dll = Get-ChildItem -Recurse -Filter WinDivert64.dll | Select-Object -First 1
          Copy-Item $sys.FullName "_publish/"
          Copy-Item $dll.FullName "_publish/"
          Write-Host "=== 发布目录 ==="
          Get-ChildItem _publish

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: HQ过检测守护程序
          path: _publish\*
