name: Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Publish
        shell: pwsh
        run: |
          dotnet publish -c Release -o _publish -r win-x64 --self-contained true
          # 下载并提取 WinDivert 驱动
          curl -L -o WinDivert.zip "https://github.com/basil00/WinDivert/releases/download/v2.2.2/WinDivert-2.2.2-A.zip"
          Expand-Archive WinDivert.zip -DestinationPath WinDivert -Force
          # 从 x64 目录复制驱动文件
          Copy-Item "WinDivert/WinDivert-2.2.2-A/x64/WinDivert64.sys" "_publish/"
          Copy-Item "WinDivert/WinDivert-2.2.2-A/x64/WinDivert.dll" "_publish/WinDivert64.dll"
          Write-Host "=== 发布目录 ==="
          Get-ChildItem _publish

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: HQ过检测守护程序
          path: _publish\*
